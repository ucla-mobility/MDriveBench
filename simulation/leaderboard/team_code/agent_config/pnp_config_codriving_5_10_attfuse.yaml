control:
    turn_KP: 1.0
    turn_KI: 0.2
    turn_KD: 0.1
    turn_n: 5  # buffer size

    speed_KP: 5.0
    speed_KI: 1
    speed_KD: 0.1
    speed_n: 20  # buffer size

    max_throttle: 0.75             # upper limit on throttle signal value in dataset
    brake_speed: 0.1               # desired speed below which brake is triggered
    brake_ratio: 1.1               # ratio of speed to desired speed at which brake is triggered
    clip_delta: 0.35               # maximum change in speed input to logitudinal controller

    max_speed: 5                   # the max speed of ego vehicle
    collision_buffer: [2.5, 1.2]   # safe distance in vertical and horizontal
    momentum: 0                    #
    target_point_distance: 10      # distance from ego vehicle to the target point generated by global navigation planner
    detect_threshold: &det_thre  0.04

# rsu config
RSU:
    change_rsu_frame: 5            # frame gap before a new rsu is spawned
    rsu_height: 7.5                # height of rsu
    rsu_lane_side: 'right'         # location of rsu, on the right/left side of the lane
    rsu_distance: 12               # horizontal distance from rsu to ego vehicle, positive value means foward direction

simulation:
    ego_num: 1                     # number of communicating drivable ego vehicles
    skip_frames: 4                 # frame gap before a new driving control signal is generated

perception:
    core_method: 'collaborative_perception'
    detect_threshold: *det_thre        #
    detection_range: [36, 12, 12, 12] # front rear left right
    perception_model_dir: 'ckpt/codriving/perception'
    # Detector-quality ablation: replace codriving's perception output with
    # HEAL HeterBaseline AttFuse detections (single-agent inference). The
    # BEV feature path is zeroed so the planner runs purely on the
    # rasterized detection occupancy — no influence from codriving's
    # joint-trained backbone. codriving's perception model still loads
    # (used for the `fused_feature` tensor shape) but its boxes are
    # discarded in pnp_infer_action_e2e_v2v.py.
    backbone: 'attfuse'
    zero_bev_feature: true
    # LiDAR mount inherits codriving's native defaults (1.3, 0, 1.85,
    # yaw=-90) so vanilla `codriving` and the codriving_<detector>
    # variants are all on the same physical sensor → AP for vanilla
    # codriving (its own perception) and the HEAL variants are on the
    # same scale and directly comparable. Cross-pipeline AP comparison
    # to perception_swap_<detector> is done at the rank/correlation
    # level, not byte-for-byte (perception_swap is on OPV2V canonical
    # mount; mount difference produces an AP-scale gap). The HEAL
    # helper auto-applies the -90° CW software rotation so HEAL still
    # sees a yaw=0-equivalent point cloud.

planning:
    core_method: 'MotionNet'
    planner_config: "codriving/hypes_yaml/codriving/end2end_codriving.yaml"
    planner_model_checkpoint: 'ckpt/codriving/planning/planner_epoch_27.ckpt'
